spring.application.name=tusmo

# ===== PostgreSQL Configuration =====
spring.datasource.url=jdbc:postgresql://localhost:5432/tusmo_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=tusmo_user
spring.datasource.password=tusmo_password

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== Logging =====
logging.level.fr.enseeiht.tusmo=DEBUG