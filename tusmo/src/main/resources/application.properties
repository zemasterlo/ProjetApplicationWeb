spring.application.name=tusmo

# ===== H2 Configuration avec fichier persistant =====
# Les données seront sauvegardées dans un fichier "tusmo.mv.db" dans le dossier courant
spring.datasource.url=jdbc:h2:file:./tusmo_db_data;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== JPA / Hibernate =====
# "update" permet de ne pas écraser les données au redémarrage
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ===== Console H2 =====
spring.h2.console.enabled=true
